<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}MediCare Admin{% endblock %}</title><link rel="stylesheet" href="{{ url_for('static',filename='admin/admin.css') }}"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><aside class="sidebar"><div class="brand">✚ <span>MediCare</span> Admin</div><nav><a href="{{url_for('admin_dashboard')}}">▦ Tổng quan</a><a href="{{url_for('admin_users')}}">👥 Người dùng</a><a href="{{url_for('admin_chats')}}">💬 Lịch sử chat</a><a href="{{url_for('admin_datasets')}}">🗂 Dataset</a><a href="{{url_for('admin_prompt')}}">🧠 Prompt</a><a href="{{url_for('admin_ai_settings')}}">⚙ AI & API</a><a href="{{url_for('admin_audit_logs')}}">📝 Nhật ký</a><a href="{{url_for('admin_backup_users_db')}}">⬇ Sao lưu DB</a><a href="{{url_for('index')}}">↗ Chatbot</a></nav><form method="post" action="{{url_for('admin_logout')}}"><button class="logout">Đăng xuất</button></form></aside><main class="main"><header class="topbar"><div><b>{% block heading %}Quản trị hệ thống{% endblock %}</b><small>Xin chào, {{session.get('full_name')}}</small></div><span class="badge success">● Hệ thống hoạt động</span></header><section class="content">{% block content %}{% endblock %}</section></main><div id="toast"></div><script>async function api(url,opt={}){const r=await fetch(url,opt);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||'Có lỗi');return d}function toast(t){const e=document.getElementById('toast');e.textContent=t;e.className='show';setTimeout(()=>e.className='',2200)}</script>{% block scripts %}{% endblock %}</body></html>
