{% extends "admin/base.html" %}{% block page_title %}AI & API{% endblock %}{% block content %}<form class="panel form-grid" method="post"><div class="panel-head full"><div><h2>Cấu hình mô hình</h2><p>API key được giữ trong .env và không hiển thị tại đây</p></div><span class="badge {{'success' if settings.api_configured else 'danger'}}">{{'API sẵn sàng' if settings.api_configured else 'Chưa có API'}}</span></div><label>Text model<input name="text_model" value="{{settings.text_model}}"></label><label>Vision model<input name="vision_model" value="{{settings.vision_model}}"></label><label>Temperature<input type="number" step="0.1" min="0" max="2" name="temperature" value="{{settings.temperature}}"></label><label>Max tokens<input type="number" min="100" max="8000" name="max_tokens" value="{{settings.max_tokens}}"></label><button class="btn primary">Lưu cấu hình</button></form>{% endblock %}
